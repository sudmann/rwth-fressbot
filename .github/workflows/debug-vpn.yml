name: Debug wireguard VPN connection

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug-vpn:
    runs-on: ubuntu-latest
    steps:
      - name: Install required packages
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard resolvconf tcpdump
      - name: Write wireguard config
        run: |
          sudo install -d -m 700 /etc/wireguard
          sudo install -m 600 /dev/null /etc/wireguard/wg0.conf
          sudo tee /etc/wireguard/wg0.conf > /dev/null <<'EOF'
          ${{ secrets.WIREGUARD_CONFIG }}#
          EOF
      - name: Bring up tunnel
        run: sudo wg-quick up wg0
      - name: Concurrent capture + ping + handshake check
        run: |
          # -w writes raw packets to a file instead of just printing them,
          # so we can inspect the capture afterward as an artifact.
          # timeout kills tcpdump after 10s in case ping finishes early.
          sudo timeout 10 tcpdump -ni wg0 icmp -w icmp.pcap > tcpdump.log 2>&1 &          TCPDUMP_PID=$!

          sleep 1   # let tcpdump attach before traffic starts
          ping -c 5 -W 2 ${{ vars.RASPI_IP_LOCAL }} || true
          PING_STATUS=$?

          wait "$TCPDUMP_PID"

          echo "----- tcpdump log -----"
          cat tcpdump.log

          echo "----- wg show after test -----"
          sudo wg show

          echo "----- packets seen on wg0 -----"
          if [ -f icmp.pcap ]; then
            sudo tcpdump -nr icmp.pcap
          else
            echo "icmp.pcap was never created — see tcpdump.log above"
          fi

          echo "ping exit status: $PING_STATUS"
          exit "$PING_STATUS"
      - name: Upload capture for inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: icmp-capture
          path: icmp.pcap
          retention-days: 1   # short retention — it's debug data, not something to keep around

      - name: Tear down tunnel
        if: always()
        run: sudo wg-quick down wg0
